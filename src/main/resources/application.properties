# ------------------------------------------------------------
# Base application configuration
# ------------------------------------------------------------
# This file contains only shared defaults that apply to all environments
# unless a profile-specific file overrides them.
#
# Important rule:
# - Do not place secrets here.
# - Do not place machine-specific values here.
# - Keep this file stable and environment-neutral.
# ------------------------------------------------------------

spring.application.name=meridian

# Startup behavior should stay predictable across environments.
spring.main.banner-mode=off

# Default logging level for framework code.
logging.level.root=INFO

# Default logging level for Meridian application code.
logging.level.com.pranith73.meridian=INFO